<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>AI Assistant</title></head>
<body>
    <div id="chat" style="height:300px; border:1px solid #ccc; overflow-y:scroll; margin-bottom:10px;"></div>
    <input type="text" id="msg" placeholder="질문 입력...">
    <button onclick="send()">전송</button>
    <script>
        async function send() {
            const msg = document.getElementById('msg').value;
            document.getElementById('chat').innerHTML += `<p>나: ${msg}</p>`;
            const res = await fetch('/api/proxy', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            if(data.candidates) {
                const reply = data.candidates[0].content.parts[0].text;
                document.getElementById('chat').innerHTML += `<p>AI: ${reply}</p>`;
            } else {
                document.getElementById('chat').innerHTML += `<p>에러: ${JSON.stringify(data)}</p>`;
            }
        }
    </script>
</body>
</html>
